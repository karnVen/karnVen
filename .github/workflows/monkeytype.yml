name: Monkeytype Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: monkeytype-hub/monkeytype-readme@master
        with:
          username: karnVen
          # Notice the hyphen here, matching your error log
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Using 'themes' instead of 'monkeytype_theme'
          themes: 'serika_dark'
          target-branch: output
        env:
          # Keeping this here as a fallback environment variable
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}
