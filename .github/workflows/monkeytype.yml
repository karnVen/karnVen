name: Generate Monkeytype Heatmap
on:
  schedule:
    - cron: "0 */12 * * *" # Updates twice a day
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SVG
        run: |
          mkdir -p output
          # Fetching your data for user: karnVen
          curl -o output/monkeytype.svg "https://monkeytype-readme.zeabur.app/generate-svg/karnVen/serika_dark?pb=true"

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: monkeytype-data # This creates a separate branch for the image
