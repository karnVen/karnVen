name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "" # This hides standard GitHub stats
          target: output # Keeps it in your 'output' branch
          plugin_monkeytype: yes
          plugin_monkeytype_token: ${{ secrets.MONKEYTYPE_APE_KEY }}
          plugin_monkeytype_user: karnVen
          plugin_monkeytype_sections: chart # This forces the heatmap grid
