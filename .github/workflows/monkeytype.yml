name: Monkeytype Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: monkeytype-hub/monkeytype-readme@master
        with:
          username: karnVen
          # The action now uses 'github-token' with a hyphen
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # The ape key should be passed as an environment variable instead
          # if the 'monkeytype_ape_key' input is no longer supported
        env:
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}
