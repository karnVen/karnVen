name: Monkeytype Stats
on:
  schedule:
    - cron: "0 0 * * *" # Updates daily at midnight
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: monkeytype-hub/monkeytype-readme@v1.0.0
        with:
          MONKEYTYPE_USERNAME: YOUR_MONKEYTYPE_USER
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}
          # Theme options: e.g., 'dracula', 'nord', 'serika_dark'
          MONKEYTYPE_THEME_NAME: 'serika_dark'
