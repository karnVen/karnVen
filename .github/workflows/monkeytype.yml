name: Monkeytype Stats
on:
  schedule:
    - cron: "0 0 * * *" # Updates daily at midnight
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: monkeytype-hub/monkeytype-readme@v1.0.0 # Updated to latest version
        with:
          monkeytype_username: karnVen # Your GitHub/Monkeytype username
          monkeytype_ape_key: ${{ secrets.MONKEYTYPE_APE_KEY }}
          # Theme options: e.g., 'dracula', 'nord', 'serika_dark'
          monkeytype_theme: 'serika_dark'
