name: Monkeytype Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: monkeytype-hub/monkeytype-readme@v1.1.0
        with:
          username: karnVen
          themes: 'serika_dark'
          monkeytype_ape_key: ${{ secrets.MONKEYTYPE_APE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
