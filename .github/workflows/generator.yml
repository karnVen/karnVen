name: Custom Heatmap Generator
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Axios
        run: npm install axios # This prevents the 'axios not found' crash

      - name: Run Generator Script
        run: node generate-heatmap.js
        env:
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update custom typing heatmap"
          file_pattern: 'monkeytype-heatmap.svg'
          branch: output
          create_branch: true
