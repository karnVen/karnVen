name: Custom Heatmap Generator
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for allowing the Action to push the image
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Axios
        run: npm install axios

      - name: Run Script
        run: node generate-heatmap.js
        env:
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}

      # This replaces the broken 's0' action from your screenshot
      - name: Commit and Push Heatmap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update custom typing heatmap [skip ci]"
          file_pattern: 'monkeytype-heatmap.svg'
          branch: output # Pushes to your branch where Pac-man lives
          create_branch: true
